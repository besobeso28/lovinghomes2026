            function filterData() {
                return faqData.filter(item => {
                    // فلتر حسب الفئة
                    const matchesFilter = activeFilter === 'all' || item.category === activeFilter;
                    
                    // فلتر حسب نص البحث (في السؤال والكلمات المفتاحية)
                    let matchesSearch = true;
                    if (searchQuery.trim() !== '') {
                        const query = searchQuery.trim().toLowerCase();
                        // بحث في السؤال والإجابة (نص HTML) والtags
                        const inQuestion = item.question.toLowerCase().includes(query);
                        const inTags = item.tags.some(tag => tag.includes(query));
                        // نبحث في النص plain text داخل الإجابة (نزيل الـ html)
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = item.answer;
                        const answerText = tempDiv.textContent || tempDiv.innerText;
                        const inAnswer = answerText.toLowerCase().includes(query);
                        
                        matchesSearch = inQuestion || inTags || inAnswer;
                    }
                    
                    return matchesFilter && matchesSearch;
                });
            }

            // دالة بناء قائمة HTML
            function renderFAQ() {
                const filtered = filterData();
                
                if (filtered.length === 0) {
                    faqListEl.innerHTML = `<div class="no-result">
                        <i class="fas fa-dog"></i><br>
                        لا توجد أسئلة مطابقة<br><span style="font-size: 0.9rem;">جرب كلمات أخرى أو اختر تصنيفاً مختلفاً</span>
                    </div>`;
                    return;
                }

                let htmlStr = '';
                filtered.forEach(item => {
                    // اضافة class active لفتح اول سؤال (اختياري) لكننا سنتركها كلها مقفولة
                    // يمكن تفعيل auto open اول عنصر اذا حذفنا السطر التالي، لكن نفضل تركها مقفولة
                    const activeClass = ''; // لا تفتح تلقائياً
                    htmlStr += `
                    <div class="faq-item" data-id="${item.id}" data-category="${item.category}">
                        <div class="faq-question">
                            <div class="question-content">
                                <i class="fas fa-paw"></i>
                                <h3>${item.question}</h3>
                            </div>
                            <span class="toggle-icon"><i class="fas fa-chevron-down"></i></span>
                        </div>
                        <div class="faq-answer">
                            <div class="answer-content">
                                ${item.answer}
                                <p style="margin-top: 0.8rem; color: #377e3a;"><i class="fas fa-tag"></i> التصنيف: 
                                    <span class="badge">${item.category === 'facility' ? 'مرافق' : (item.category==='packages'?'الحزم':'خدمات')}</span>
                                </p>
                            </div>
                        </div>
                    </div>`;
                });
                faqListEl.innerHTML = htmlStr;

                // بعد اضافة HTML نربط حدث النقر لكل عنصر لفتح/غلق السؤال
                attachToggleEvents();
            }

            // فتح وغلق الأسئلة عند الضغط
            function attachToggleEvents() {
                document.querySelectorAll('.faq-item').forEach(item => {
                    const questionDiv = item.querySelector('.faq-question');
                    if (!questionDiv) return;

                    // ازالة أي مستمع سابق (بسيط) - نستبدل بمستمع جديد
                    questionDiv.replaceWith(questionDiv.cloneNode(true));
                });

                // نعيد جلب الـ items بعد الاستنساخ
                document.querySelectorAll('.faq-item').forEach(item => {
                    const questionDiv = item.querySelector('.faq-question');
                    questionDiv.addEventListener('click', function(e) {
                        // نبدل حالة active في العنصر الحالي
                        const currentlyActive = item.classList.contains('active');
                        
                        // (اختياري) إذا أردنا غلق الباقي عند فتح واحد: نزيل active من الجميع ثم نضيف على الحالي اذا لم يكن active
                        // لكن الأجمل ان يظل مفتوح متعدد. (نطبقه حسب الرغبة)
                        // سنستخدم نمط "متعدد مفتوح" (كل عنصر يفتح ويغلق مستقل)
                        
                        if (currentlyActive) {
                            item.classList.remove('active');
                        } else {
                            item.classList.add('active');
                        }
                        
                        // منع انتشار الحدث
                        e.stopPropagation();
                    });
                });
            }

            // تحديث النتائج بناء على البحث والفلتر
            function updateResults() {
                renderFAQ();
            }

            // مستمعات البحث
            searchInput.addEventListener('input', function(e) {
                searchQuery = e.target.value;
                updateResults();
            });

            // مستمعات أزرار التصفية
            filterButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    // إزالة active من الكل
                    filterButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    activeFilter = this.getAttribute('data-filter');
                    updateResults();
                });
            });

            // تهيئة أولية
            renderFAQ();

            // افتح أول عنصر تلقائياً (اختياري) لإظهار التفاعلية
            // لكننا سنتركها مغلقة. لكن يمكن تفعيل السطر التالي لفتح اول سؤال بعد التحميل
            // يمكن استخدام setTimeout لضمان وجود العناصر
            setTimeout(() => {
                const firstItem = document.querySelector('.faq-item');
                if (firstItem) firstItem.classList.add('active');
            }, 100);
        })();
    </script>
</body>
</html>
